server:
  port: 8080

spring:
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath:mapper/*.xml

# JWT 配置
jwt:
  secret: auto-parts-store-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  expiration: 259200000  # 3天（毫秒）
