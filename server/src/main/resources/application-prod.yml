# 生产环境配置（通用）
server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auto_parts_store?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: autoparts
    password: 请修改为强密码
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

# 微信小程序配置
wechat:
  miniapp:
    app-id: 请填写真实AppID
    app-secret: 请填写真实AppSecret
    login-url: https://api.weixin.qq.com/sns/jscode2session

# JWT 配置
jwt:
  secret: 请修改为256位以上随机字符串-auto-parts-store-jwt-secret-production
  expiration: 259200000  # 3天

# 生产环境关闭 SQL 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# 日志配置
logging:
  file:
    name: /var/log/autoparts/app.log
  level:
    com.autoparts: INFO
    root: WARN
